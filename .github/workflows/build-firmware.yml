name: Build Firmware for All Device Types

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device_config:
          - name: "TD01"
            config: "CONFIG_DEVICE_TD01=y"
          - name: "DIANJI"
            config: "CONFIG_DEVICE_DIANJI=y"
          - name: "QTZ"
            config: "CONFIG_DEVICE_QTZ=y"
          - name: "ZIDONGSUO"
            config: "CONFIG_DEVICE_ZIDONGSUO=y"
          - name: "PJ01"
            config: "CONFIG_DEVICE_PJ01=y"
          - name: "QIYA"
            config: "CONFIG_DEVICE_QIYA=y"
          - name: "DZC01"
            config: "CONFIG_DEVICE_DZC01=y"
          - name: "CUNZHI01"
            config: "CONFIG_DEVICE_CUNZHI01=y"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Configure device type
      run: |
        # 合并默认配置 (包含分区表配置)
        cat sdkconfig.defaults sdkconfig.defaults.esp32c3 > sdkconfig
        
        # 启用当前设备类型
        echo "${{ matrix.device_config.config }}" >> sdkconfig
        
        # 显示当前配置
        echo "Current device configuration:"
        grep -E "CONFIG_DEVICE_(TD01|DIANJI|QTZ|ZIDONGSUO|PJ01|QIYA|DZC01|CUNZHI01)" sdkconfig || true

    - name: ESP-IDF Build and Merge
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.2.3
        target: esp32c3
        path: '.'
        command: >
          idf.py build && 
          cd build && 
          esptool.py --chip esp32c3 merge_bin -o under_silicon_${{ matrix.device_config.name }}_${{ github.ref_name }}_merged.bin @flash_args && 
          mv under_silicon.bin under_silicon_${{ matrix.device_config.name }}_${{ github.ref_name }}.bin

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.device_config.name }}
        path: |
          build/under_silicon_${{ matrix.device_config.name }}_${{ github.ref_name }}_merged.bin
          build/under_silicon_${{ matrix.device_config.name }}_${{ github.ref_name }}.bin
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: firmware-files

    - name: List downloaded files
      run: |
        echo "Downloaded artifact structure:"
        find firmware-files -type f -name "*.bin" | head -20

    - name: Create release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          firmware-files/firmware-*/under_silicon_*.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload firmware summary
      run: |
        echo "## Firmware Build Summary" > firmware_summary.md
        echo "" >> firmware_summary.md
        echo "Built firmware for the following device types:" >> firmware_summary.md
        echo "" >> firmware_summary.md
        for device in TD01 DIANJI QTZ ZIDONGSUO PJ01 QIYA DZC01 CUNZHI01; do
          for file in firmware-files/firmware-${device}/under_silicon_*.bin; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(stat -c%s "$file" 2>/dev/null || echo "Unknown")
              echo "- **${device}**: ${filename} (${size} bytes)" >> firmware_summary.md
            fi
          done
        done
        
        cat firmware_summary.md

    - name: Generate OSS version manifest
      continue-on-error: true
      env:
        OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
        RELEASE_VERSION: ${{ github.ref_name }}
        RELEASE_COMMIT: ${{ github.sha }}
      run: |
        python3 <<'PY'
        import datetime
        import hashlib
        import json
        import os
        from pathlib import Path

        firmware_root = Path("firmware-files")
        upload_root = Path("oss-upload")
        upload_root.mkdir(exist_ok=True)

        version = os.environ["RELEASE_VERSION"]
        commit = os.environ["RELEASE_COMMIT"]
        prefix = os.environ.get("OSS_PREFIX", "").strip("/")
        latest_prefix = f"{prefix}/latest" if prefix else "latest"

        firmwares = []
        for path in sorted(firmware_root.glob("firmware-*/under_silicon_*.bin")):
            device = path.parent.name.removeprefix("firmware-")
            filename = path.name
            sha256 = hashlib.sha256()
            with path.open("rb") as firmware_file:
                for chunk in iter(lambda: firmware_file.read(1024 * 1024), b""):
                    sha256.update(chunk)

            firmwares.append({
                "device": device,
                "kind": "merged" if filename.endswith("_merged.bin") else "app",
                "filename": filename,
                "object_key": f"{latest_prefix}/{filename}",
                "size_bytes": path.stat().st_size,
                "sha256": sha256.hexdigest(),
            })

        if not firmwares:
            raise SystemExit("No firmware files found for OSS manifest")

        manifest = {
            "latest_version": version,
            "generated_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
            "commit": commit,
            "firmwares": firmwares,
        }

        (upload_root / "version.json").write_text(
            json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
            encoding="utf-8",
        )
        print(json.dumps(manifest, ensure_ascii=False, indent=2))
        PY

    - name: Upload firmware and manifest to Aliyun OSS
      continue-on-error: true
      env:
        OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
        OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
        RELEASE_VERSION: ${{ github.ref_name }}
      run: |
        set -Eeuo pipefail

        missing=0
        for name in OSS_ENDPOINT OSS_BUCKET OSS_ACCESS_KEY_ID OSS_ACCESS_KEY_SECRET OSS_PREFIX; do
          if [ -z "${!name:-}" ]; then
            echo "::warning::${name} is not configured; skipping Aliyun OSS upload"
            missing=1
          fi
        done

        if [ "$missing" -ne 0 ]; then
          exit 0
        fi

        if [ ! -f oss-upload/version.json ]; then
          echo "::warning::oss-upload/version.json was not generated; skipping Aliyun OSS upload"
          exit 0
        fi

        sudo -v
        curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

        ossutil_config="${RUNNER_TEMP}/ossutilconfig"
        cat > "$ossutil_config" <<EOF
        [Credentials]
        language = EN
        endpoint = ${OSS_ENDPOINT}
        accessKeyID = ${OSS_ACCESS_KEY_ID}
        accessKeySecret = ${OSS_ACCESS_KEY_SECRET}
        EOF
        chmod 600 "$ossutil_config"

        oss_prefix="${OSS_PREFIX#/}"
        oss_prefix="${oss_prefix%/}"
        if [ -n "$oss_prefix" ]; then
          oss_base="oss://${OSS_BUCKET}/${oss_prefix}/latest"
        else
          oss_base="oss://${OSS_BUCKET}/latest"
        fi

        find firmware-files -path "*/under_silicon_*.bin" -type f | sort | while read -r file; do
          filename="$(basename "$file")"
          ossutil cp "$file" "${oss_base}/${filename}" -f -c "$ossutil_config"
        done

        ossutil cp oss-upload/version.json "${oss_base}/version.json" -f -c "$ossutil_config"

        ossutil rm "${oss_base}/" -r -f \
          --include "under_silicon_*.bin" \
          --exclude "*_${RELEASE_VERSION}*.bin" \
          -c "$ossutil_config" || echo "::warning::Failed to clean old firmware files from Aliyun OSS latest directory"
